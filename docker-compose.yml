# O Motor sobe INDEPENDENTE do core, mas compartilha o MESMO Postgres (regra de
# ouro: um só banco). Em produção (Coolify) o Postgres é um serviço externo e este
# arquivo é referência; localmente, aponte DATABASE_URL para o Postgres do core.
services:
  motor:
    build: .
    environment:
      # MESMO Postgres do core (public = control plane; tenant_<id> = tabelas do Motor).
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/sapienza}
      # Fail-closed (`:?`): com um default conhecido, qualquer um forja um JWT com
      # `tid` arbitrário e lê o conteúdo de qualquer tenant. MESMO valor do core.
      PRODUCT_JWT_SECRET: ${PRODUCT_JWT_SECRET:?defina PRODUCT_JWT_SECRET (o MESMO valor do core)}
      # Cifra as credenciais de canal por tenant (AES-256-GCM, base64 de 32 bytes).
      # Perder esta chave torna as credenciais já gravadas irrecuperáveis.
      MOTOR_ENC_KEY: ${MOTOR_ENC_KEY:?defina MOTOR_ENC_KEY (openssl rand -base64 32)}
      # Secret dos crons (publish-scheduled / close-approval-window / provision).
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?defina WEBHOOK_SECRET (segredo dos crons)}
      # Geração de conteúdo (opcional; sem chave cai no rascunho determinístico).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Storage da imagem on-brand. Sem o conjunto completo, publica sem imagem —
      # e Instagram/Threads, que exigem imagem, falham. Ver README.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      # As credenciais de Instagram/LinkedIn/etc. NÃO são env: chegam por tenant
      # no setup e ficam cifradas em `motor_channels`.
      NODE_ENV: production
    ports:
      - "3100:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
