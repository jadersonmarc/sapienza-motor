# O Motor sobe INDEPENDENTE do core, mas compartilha o MESMO Postgres (regra de
# ouro: um só banco). Em produção (Coolify) o Postgres é um serviço externo e este
# arquivo é referência; localmente, aponte DATABASE_URL para o Postgres do core.
services:
  motor:
    build: .
    environment:
      # MESMO Postgres do core (public = control plane; tenant_<id> = tabelas do Motor).
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/sapienza}
      # Segredo compartilhado com o core p/ validar o JWT curto do produto.
      PRODUCT_JWT_SECRET: ${PRODUCT_JWT_SECRET:-troque-por-um-segredo-forte}
      # Cifra as credenciais de canal por tenant (AES-256-GCM, base64 de 32 bytes).
      MOTOR_ENC_KEY: ${MOTOR_ENC_KEY:-}
      # Secret dos crons (publish-scheduled / close-approval-window / provision).
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-troque-o-webhook-secret}
      # Geração de conteúdo (opcional; sem chave cai no rascunho determinístico).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Credenciais de canal / storage (opcionais; fornecidas no setup do cliente).
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
      LINKEDIN_AUTHOR_URN: ${LINKEDIN_AUTHOR_URN:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      NODE_ENV: production
    ports:
      - "3100:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
