name: CI

# Gate de qualidade: typecheck + build + testes (inclui integração contra Postgres).
on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sapienza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sapienza_test?sslmode=disable
      MOTOR_ENC_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtMDA=
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test (unit + integração)
        run: pnpm test
