name: Cron · fechar janela de aprovação

# Peças 'in_review' com a janela de 48h vencida → publicadas (silêncio = aprovado).
# De hora em hora. Secrets: MOTOR_URL, WEBHOOK_SECRET.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -fsS -X POST "${{ secrets.MOTOR_URL }}/api/cron/close-approval-window" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}"
